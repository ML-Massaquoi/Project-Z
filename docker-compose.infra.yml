# Infrastructure only — PostgreSQL + Redis
# Backend runs on HOST (not Docker) so it can receive RONASOFT ADMS pushes
# directly on the host network interface.
#
# Usage:
#   docker compose -f docker-compose.infra.yml up -d
#
# Postgres is accessible at localhost:5432
# Redis   is accessible at localhost:6379

version: "3.9"

services:

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: projectz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: projectz_db
      POSTGRES_USER: projectz
      POSTGRES_PASSWORD: "519016"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projectz -d projectz_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: projectz-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
