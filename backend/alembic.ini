[alembic]
script_location = alembic

# URL is set dynamically from DATABASE_URL_SYNC env var in alembic/env.py
# This value is overridden at runtime — do not rely on it
sqlalchemy.url = postgresql://projectz:projectz_secret@localhost:5432/projectz

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
