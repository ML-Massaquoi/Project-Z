# Development overrides for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Hybrid development: runs DB/Redis in Docker, apps on host for hot-reload.

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  backend:
    profiles:
      - disabled

  frontend:
    profiles:
      - disabled

  nginx:
    profiles:
      - disabled

  adms-receiver:
    profiles:
      - disabled
